components:
  schemas:
    Filme:
      required:
        - nome
        - data_lancamento
        - duracao
        - sinopse
        - valor

      type: object

      properties:
        id:
          type: integer

        nome:
          type: string

        data_lancamento:
          type: string

        duracao:
          type: number

        sinopse:
          type: string

        avaliacao:
          type: string

        valor:
          type: number

        capa:
          type: string

        id_classificacao:
          type: integer


    Atividade:
      required:
        - nome

      type: object

      properties:
        id:
          type: integer

        nome:
          type: string


    Ator:
      required:
        - nome
        - data_nascimento
        - ativo
        - biografia

      type: object

      properties:
        id:
          type: integer

        nome:
          type: string

        data_nascimento:
          type: string

        data_falecimento:
          type: string

        ativo:
          type: integer

        biografia:
          type: string

        foto:
          type: string


    Classificacao:
      required:
        - idade
        - classificacao
        - descricao

      type: object

      properties:
        id:
          type: integer

        idade:
          type: integer

        classificacao:
          type: string

        descricao:
          type: string


    Diretor:
      required:
        - nome
        - data_nascimento
        - ativo
        - biografia

      type: object

      properties:
        id:
          type: integer

        nome:
          type: string

        data_nascimento:
          type: string

        data_falecimento:
          type: string

        ativo:
          type: integer

        biografia:
          type: string

        foto:
          type: string


    Genero:
      required:
        - genero

      type: object

      properties:
        id:
          type: integer

        genero:
          type: string


    Nacionalidade:
      required:
        - pais

      type: object

      properties:
        id:
          type: integer

        pais:
          type: string

        sigla:
          type: string